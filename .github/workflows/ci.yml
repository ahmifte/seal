name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  hook-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify hook is executable bash
        run: |
          chmod +x hooks/pre-commit scripts/*.sh
          bash -n hooks/pre-commit
          bash -n scripts/install.sh
          bash -n scripts/install-all.sh
      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz | tar xz -C /tmp
          sudo mv /tmp/gitleaks /usr/local/bin/
      - name: Scan repository
        run: gitleaks detect --source . --config gitleaks.toml --verbose --redact
